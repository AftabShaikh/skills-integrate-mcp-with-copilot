<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <!-- Toolbar: search, filter, sort -->
      <div id="toolbar">
        <input type="text" id="search-input" placeholder="Search activities..." />
        <select id="category-filter">
          <option value="">All Categories</option>
        </select>
        <select id="sort-select">
          <option value="name-asc">Name (A-Z)</option>
          <option value="name-desc">Name (Z-A)</option>
          <option value="spots-asc">Spots Left (Low-High)</option>
          <option value="spots-desc">Spots Left (High-Low)</option>
        </select>
      </div>

      <!-- Activity cards -->
      <div id="activities-list">
        <p>Loading activities...</p>
      </div>

      <!-- Toast message -->
      <div id="message" class="hidden"></div>
    </main>

    <!-- Registration modal -->
    <div id="modal-overlay" class="hidden">
      <div id="modal">
        <button id="modal-close">&times;</button>
        <h3>Register for <span id="modal-activity-name"></span></h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <button type="submit">Register</button>
        </form>
      </div>
    </div>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
